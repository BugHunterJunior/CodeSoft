{% extends "base.html" %}
{% block title %}Edit Task — Taskr{% endblock %}

{% block content %}

<div class="page-header">
  <a href="{{ url_for('tasks.dashboard') }}" class="back-link">
    ← Back to dashboard
  </a>
  <h1 class="page-title">Edit Task</h1>
</div>

<div class="card edit-card">
  <form 
    action="{{ url_for('tasks.update', task_id=task['id']) }}" 
    method="post" 
    class="task-form"
    novalidate
  >

    {% set t = task %}

    <!-- Title -->
    <div class="form-group">
      <label for="title">
        Title <span class="required">*</span>
      </label>

      <input
        type="text"
        id="title"
        name="title"
        value="{{ t['title'] }}"
        placeholder="What needs to be done?"
        maxlength="200"
        required
        autofocus
      >
    </div>

    <!-- Description -->
    <div class="form-group">
      <label for="description">Description</label>

      <textarea
        id="description"
        name="description"
        rows="4"
        placeholder="Add more details (optional)"
      >{{ t['description'] or '' }}</textarea>
    </div>

    <!-- Priority + Date -->
    <div class="form-row">

      <div class="form-group">
        <label for="priority">Priority</label>

        <select id="priority" name="priority">
          <option value="low"    {% if t['priority'] == 'low' %}selected{% endif %}>🟢 Low</option>
          <option value="medium" {% if t['priority'] == 'medium' %}selected{% endif %}>🟡 Medium</option>
          <option value="high"   {% if t['priority'] == 'high' %}selected{% endif %}>🔴 High</option>
        </select>
      </div>

      <div class="form-group">
        <label for="due_date">Due Date</label>

        <input
          type="date"
          id="due_date"
          name="due_date"
          value="{{ t['due_date'] or '' }}"
        >
      </div>

    </div>

    <!-- Actions -->
    <div class="form-actions">
      <a href="{{ url_for('tasks.dashboard') }}" class="btn btn-ghost">
        Cancel
      </a>

      <button type="submit" class="btn btn-primary">
        Save Changes
      </button>
    </div>

  </form>
</div>

{% endblock %}
