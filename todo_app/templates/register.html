{% extends "base.html" %}
{% block title %}Register — Taskr{% endblock %}

{% block content %}

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Start organizing your tasks</p>
    </div>

    <!-- Form -->
    <form 
      action="{{ url_for('auth.register') }}" 
      method="post" 
      class="auth-form"
      novalidate
    >

      {% set f = form %}

      <div class="form-group">
        <label for="username">Username</label>

        <input
          type="text"
          id="username"
          name="username"
          value="{{ f.get('username', '') }}"
          placeholder="johndoe"
          autocomplete="username"
          minlength="3"
          maxlength="50"
          required
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>

        <input
          type="email"
          id="email"
          name="email"
          value="{{ f.get('email', '') }}"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>

        <input
          type="password"
          id="password"
          name="password"
          placeholder="Min 6 characters"
          autocomplete="new-password"
          minlength="6"
          required
        >
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>

        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Re-enter password"
          autocomplete="new-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Create Account
      </button>

    </form>

    <!-- Switch -->
    <p class="auth-switch">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>

  </div>
</div>

{% endblock %}
